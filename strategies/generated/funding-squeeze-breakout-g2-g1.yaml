id: funding-squeeze-breakout-g2-g1
thesis: 'Il fade del crowding funziona solo dove il mercato è in range: gate di vol_compression.
  In trend la "folla" ha ragione e il fade viene travolto (SOL). Falsificata se: il
  gate non elimina le perdite su SOL/WLD o uccide i guadagni su SUI/ZEC.

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: funding_percentile
  params:
    lookback_h: 168
    extreme_pct: 92
- name: taker_flow
  params:
    lookback_h: 24
    threshold: 0.02
- name: vol_compression
  params:
    lookback_h: 48
    pct: 30
entry:
  rule: funding_percentile AND taker_flow AND vol_compression
  direction: contrarian_funding
exit:
  stop_pct: 2.0
  target_r: 1.5
  time_stop_h: 24
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: Gate vol_compression (pct 30, più permissivo del default per non strozzare
    le entry già rare). Resto identico al parent g2.
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-g2
status: retired
created: '2026-06-11'
