id: funding-squeeze-breakout-g2-g4
thesis: 'Il funding è un proxy lento del crowding; il taker flow è il crowding in
  tempo reale. Fade del flow estremo in mercati compressi, senza funding: più segnali,
  stessa logica di esaurimento. Falsificata se: il flow da solo (senza conferma funding)
  non ha edge — win rate ≤50% sul basket.

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: taker_flow
  params:
    lookback_h: 24
    threshold: 0.025
- name: vol_compression
  params:
    lookback_h: 48
    pct: 30
entry:
  rule: taker_flow AND vol_compression
  direction: contrarian:taker_flow
exit:
  stop_pct: 2.0
  target_r: 1.5
  time_stop_h: 24
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: 'Tolto funding, fade diretto del flow in compressione. Test di ablazione:
    se rende come g2, il funding non serviva.'
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-g2
status: retired
created: '2026-06-11'
