id: lux-1.0
parent: tsmom-liq-v1
status: challenger
created: '2026-06-17'
thesis: >
  LUX 1.0 — flagship TOP, miglior rapporto rischio/rendimento: la distillazione di
  tutto ciò che abbiamo imparato. Entra solo su TRIPLA CONFLUENZA ORTOGONALE: trend
  (tsmom) + liquidazioni reali Coinalyze (liq_imbalance, l'unico edge robusto provato)
  + forecast del foundation model Kronos. Tre fonti indipendenti (prezzo, flusso di
  liquidazioni, modello) che devono concordare → entry rare ma ad altissima convinzione.
  La direzione esce dal VOTO di 5 segnali ortogonali (ai tre si aggiungono smart-money
  positioning e OI-confirmed trend), così la convinzione è misurata, non binaria. Veto
  sugli eventi news (tone falsificato come predittore — usato solo come filtro di
  volatilità). Exit lesson-informed: stop alla soglia di invalidazione, lascia correre
  i vincenti a 3R. Rischio ROBUSTO (leva 2, 1.5%/trade, 3 posizioni): qui si ottimizza
  il risk-adjusted, non si spinge come la BETA. Gira in parallelo al desk agenti LLM
  (agents-v1, che sta performando bene) e ne condivide il pool di lezioni.
  Falsificata se: la confluenza a 5 segnali NON batte il tsmom-liq a 2 segnali sullo
  Sharpe_r in paper → i segnali extra sono rumore e va semplificata.
universe:
  selection: explicit
  max_assets: 9
  kinds:
  - mixed
timeframe: 1h
decision_every_h: 4
signals:
- name: tsmom
  params:
    short_h: 168
    long_h: 720
- name: liq_imbalance
  params:
    lookback_d: 21
    extreme_pct: 75
- name: kronos_forecast
  params:
    horizon_h: 24
    min_move_pct: 1.0
- name: smart_money_ratio
  params:
    lookback_h: 720
    extreme_pct: 80
- name: oi_trend
  params:
    lookback_d: 3
    price_lb_h: 72
    min_oi_chg_pct: 1.0
- name: news_event
  params:
    topics: crypto
    max_age_h: 24
    min_z: 3.0
entry:
  rule: tsmom AND liq_imbalance AND kronos_forecast
  direction: signal_vote
  veto: news_event
exit:
  stop_pct: 2.5
  target_r: 3.0
  time_stop_h: 240
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.5
  max_concurrent_positions: 3
evolution:
  mutable:
  - signals
  - entry
  - exit
  notes: 'LUX 1.0 TOP — tripla confluenza ortogonale (tsmom+liq+kronos), voto a 5 segnali, veto news, rischio robusto. Best-of risk-adjusted.'
backtest: {}
paper_symbols: BTC,ETH,SOL,XRP,SUI,NEAR,WLD,ZEC,CRV
