id: funding-squeeze-breakout-g2-g1-g3
thesis: 'Con il gate che filtra i trend, si può dare più corda al rimbalzo: target
  2R e time stop 48h. Falsificata se: il tempo extra in posizione riporta le perdite
  da deriva (Sharpe < g2-g1).

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: funding_percentile
  params:
    lookback_h: 168
    extreme_pct: 92
- name: taker_flow
  params:
    lookback_h: 24
    threshold: 0.02
- name: vol_compression
  params:
    lookback_h: 48
    pct: 30
entry:
  rule: funding_percentile AND taker_flow AND vol_compression
  direction: contrarian_funding
exit:
  stop_pct: 2.0
  target_r: 2.0
  time_stop_h: 48
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: g2-g1 con exit più pazienti (2R / 48h).
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-g2-g1
status: retired
