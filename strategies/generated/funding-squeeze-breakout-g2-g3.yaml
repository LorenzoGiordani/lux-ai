id: funding-squeeze-breakout-g2-g3
thesis: 'L''esaurimento del crowding si risolve in poche ore o non si risolve: uscita
  scalp (target 1R, time stop 12h) cattura il rimbalzo immediato ed evita di restare
  esposti quando il fade è sbagliato (trend). Falsificata se: il win rate non sale
  sopra il 55% o il profit factor scende sotto 1.2.

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: funding_percentile
  params:
    lookback_h: 168
    extreme_pct: 92
- name: taker_flow
  params:
    lookback_h: 24
    threshold: 0.02
entry:
  rule: funding_percentile AND taker_flow
  direction: contrarian_funding
exit:
  stop_pct: 1.5
  target_r: 1.0
  time_stop_h: 12
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: 'Solo exit mutate: scalp asimmetrico. Stop 1.5 / target 1.5% / 12h. Riduce
    l''esposizione al rischio trend che ha ucciso SOL.'
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-g2
status: retired
created: '2026-06-11'
