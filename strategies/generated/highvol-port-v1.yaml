thesis: >
  HIGH-VOL ANOMALY (inverso della classica low-vol anomaly). Nel basket crypto, gli
  asset PIU' VOLATILI delle ultime 72h sovraperformano i piu' calmi su orizzonti
  medi. E' ortogonale al momentum: ranka la VOLATILITA' (dev standard dei rendimenti),
  non il rendimento stesso. Tesi: il risk premium crypto — le alt piccole/volatili
  pagano un premio per il rischio sistemico (beta al beta) che il dollar-neutral
  di xsmom NETTA via. Long le gambe volatili (SOL/CRV/ZEC tipicamente), short i
  blue chip calmi (BTC/ETH) raccoglie quello che xsmom non vede.
  Edge VALIDATO (backtest_factor_zoo.py, basket 9 crypto 12m, 26/06):
    HIGH-VOL lb72: Sharpe 2.32, +109%, maxDD -22%, DSR 0.87
    correlazione rendimenti vs xsmom: SOLO +0.28 (diversificazione genuina, non
    ridondanza — le varianti xsmom erano corr ~0.9 fra loro).
  Attenzione: NON e' low-vol (quella e' anomalia documentata su EQUITY, regime
  istituzionale). Su crypto retail il segno e' invertito: il risk-seeking premia
  la volatilita'. Falsificata se: in walk-forward non mantiene Sharpe > 1.5, o se
  la correlazione con xsmom sale sopra 0.5 (allora e' momentum mascherato).

