id: xsmom-highvol-combo-v1
parent: xsmom-port-v1           # combo dei 2 edge ortogonali (corr 0.28)
status: challenger      # 26/06: minor drawdown del progetto (-16%), combo 2 edge ortogonali
engine: portfolio
created: '2026-06-26'
thesis: >
  COMBO dei DUE edge ortogonali forti del progetto: xsmom (momentum relativo, corr
  al beta comune nettato) + HIGH-VOL (risk premium crypto, long alt volatili). I due
  fattori hanno correlazione rendimenti +0.28 (diversificazione GENUINA, non
  ridondanza: le varianti xsmom erano corr ~0.9 fra loro e non abbassavano il DD).
  Pesi 70% xsmom (core, piu' stabile) + 30% high-vol (tilt al risk premium). La combo
  NON alza lo Sharpe vs i singoli (2.38 vs 2.13/2.32) MA ABBATTE IL DRAWDOWN:
  maxDD -16% (il piu' basso di tutti i test) vs -19% xsmom e -22% highvol.
  Tesi Asness 'Cornerstones of factor investing' (2015): combinare fattori ortogonali
  riduce la volatilita' senza sacrificare il ritorno (effetto Markowitz sui fattori).
  Falsificata se: in paper il DD non risulta inferiore ai singoli, o se la correlazione
  sale sopra 0.5 nel live (i fattori non sono poi cosi' ortogonali).

