  notes: >
    v1 seed: 70/30 xsmom/highvol. Mutazioni: tilt pesi (50/50, 80/20), aggiunta
    multihorizon come terza gamba ortogonale.
backtest:
  basket_12m:
    aggregate:
      total_return: 0.7900
      sharpe: 2.38
      max_drawdown: -0.1607
