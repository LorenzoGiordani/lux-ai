id: funding-squeeze-breakout-g3
thesis: 'La tesi del parent è giusta ma l''esecuzione muore di stop: 15/32 trade stoppati
  con stop 2.5% su rumore 1h di BTC. Range più lungo (72h) = breakout più rari ma
  più significativi; stop più largo (3.5%) sopravvive al rumore; target più ambizioso
  sfrutta i trend che il parent già prende. Falsificata se: il churn da stop non cala
  o il maxDD peggiora oltre il 15%.

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: funding_percentile
  params:
    lookback_h: 168
    extreme_pct: 90
- name: range_breakout
  params:
    range_h: 72
    volume_confirm_mult: 2.5
entry:
  rule: funding_percentile AND range_breakout
  direction: with_breakout
exit:
  stop_pct: 3.5
  target_r: 2.5
  time_stop_h: 96
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: Stessa tesi del parent, esecuzione ricalibrata sul breakdown delle uscite
    (15 stop / 5 target). Selettività su (range più lungo, volume più alto), tolleranza
    al rumore su (stop più largo).
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-v1
