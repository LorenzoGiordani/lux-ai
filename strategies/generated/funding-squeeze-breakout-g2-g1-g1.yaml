id: funding-squeeze-breakout-g2-g1-g1
thesis: 'Gate confermato + estremo più profondo (95): fade solo i crowding veri nei
  mercati compressi. Falsificata se: i trade scendono sotto ~30 sul basket (segnale
  troppo raro per essere una strategia) o Sharpe medio resta <0.

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: funding_percentile
  params:
    lookback_h: 336
    extreme_pct: 95
- name: taker_flow
  params:
    lookback_h: 24
    threshold: 0.02
- name: vol_compression
  params:
    lookback_h: 48
    pct: 30
entry:
  rule: funding_percentile AND taker_flow AND vol_compression
  direction: contrarian_funding
exit:
  stop_pct: 2.0
  target_r: 1.5
  time_stop_h: 24
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: g2-g1 con estremo 95/336h invece di 92/168h.
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-g2-g1
status: retired
