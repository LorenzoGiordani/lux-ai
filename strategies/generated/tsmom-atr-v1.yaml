id: tsmom-atr-v1
parent: tsmom-v1
status: retired
created: 2026-06-21
thesis: 'Stessa tesi TSMOM del parent, ma stop volatility-adaptive (k*ATR invece di
  % fissa) e RR 2 invece di 3. Ipotesi: lo stop ATR sopravvive al rumore senza essere
  troppo largo, e un TP a 2R viene ittato molto più spesso di 3R. Falsificata se:
  su basket misto crypto+commodities non batte il parent (tsmom-v1, RR3 stop fisso)
  su Sharpe e consistenza fold in walk-forward + paper.

  '
universe:
  selection: top_liquidity
  min_day_volume_usd: 1000000
  exclude: []
  exclude_classes:
  - index
  max_assets: 12
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: tsmom
  params:
    short_h: 168
    long_h: 720
entry:
  rule: tsmom
  direction: follow:tsmom
exit:
  stop_pct: 4.0
  stop_atr_mult: 3.0
  target_r: 2.0
  atr_period: 14
  time_stop_h: 240
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 10
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: 'Mutazione exit di tsmom-v1: stop_atr_mult 3.0 + target_r 2.0 (no partial:
    su trend lento frammenta). In A/B 6m/6-asset dava più rendimento del parent (meanRet
    +8.5% vs +4.9%) ma Sharpe inferiore (0.64 vs 0.97) → il paper gate decide.'
backtest: {}
paper_symbols: BTC,ETH,xyz_GOLD,xyz_CL,xyz_BRENTOIL,xyz_SILVER,xyz_SP500,xyz_MU
