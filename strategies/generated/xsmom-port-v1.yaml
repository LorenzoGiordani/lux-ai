thesis: 'Cross-sectional momentum a PORTAFOGLIO: long il top-terzile del basket per
  forza relativa (ultime 168h), short il bottom-terzile, dollar-neutral, ribilanciato
  ogni 168h. Lo stesso edge che da -14.5% nell''engine per-simbolo stop-based (l''IC
  e troppo sottile per trade discreti) rende +29.4% Sharpe 1.97 maxDD -12% a portafoglio
  (backtest_portfolio.py, basket 9 crypto 6m): l''edge sta nello SPREAD mantenuto,
  non nel singolo trade, e il dollar-neutral netta il beta comune (corr basket 0.63)
  abbattendo il drawdown. Turnover basso (25 ribilanci/6m). Falsificata se: in paper
  il book dollar-neutral non batte l''equal-weight B&H risk-adjusted, o se l''edge
  sparisce coi costi reali di ribilanciamento.

  '
