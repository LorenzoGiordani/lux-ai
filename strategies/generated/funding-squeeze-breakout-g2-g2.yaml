id: funding-squeeze-breakout-g2-g2
thesis: 'Gli estremi di funding poco profondi sono rumore: solo il percentile 97 segnala
  vero squeeze imminente. Meno trade, più selettivi — su tutto il basket. Falsificata
  se: la selettività riduce i trade senza migliorare Sharpe medio o win rate.

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: funding_percentile
  params:
    lookback_h: 336
    extreme_pct: 97
- name: taker_flow
  params:
    lookback_h: 24
    threshold: 0.02
entry:
  rule: funding_percentile AND taker_flow
  direction: contrarian_funding
exit:
  stop_pct: 2.0
  target_r: 1.5
  time_stop_h: 24
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: 'Estremo più profondo (97 su finestra 2 settimane). Ipotesi: la coda della
    distribuzione del funding è dove vive l''edge del fade.'
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-g2
status: retired
