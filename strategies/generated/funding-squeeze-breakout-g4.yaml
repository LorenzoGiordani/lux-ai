id: funding-squeeze-breakout-g4
thesis: 'Il filtro funding del parent è troppo restrittivo (19 barre di entry in 6
  mesi) e ortogonale alla qualità del breakout. La conferma diretta è il taker flow:
  rottura di range CON aggressori nella direzione della rottura = vera partecipazione.
  Falsificata se: aggiungere taker_flow non migliora win rate o profit factor rispetto
  al breakout semplice.

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: range_breakout
  params:
    range_h: 48
    volume_confirm_mult: 1.5
- name: taker_flow
  params:
    lookback_h: 12
    threshold: 0.025
entry:
  rule: range_breakout AND taker_flow
  direction: with_breakout
exit:
  stop_pct: 2.5
  target_r: 3.0
  time_stop_h: 72
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: 'Funding sostituito da conferma di flusso (più entry, conferma più pertinente).
    Volume mult abbassato a 1.5 perché taker_flow già filtra la partecipazione. Target
    3R: i breakout confermati dal flusso meritano più corda.'
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-v1
