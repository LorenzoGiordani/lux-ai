id: funding-squeeze-breakout-g2-g1-g2
thesis: 'Il gate a pct 30 è troppo severo per un segnale già raro: pct 45 tiene fuori
  solo i trend conclamati. Più trade, stesso scudo. Falsificata se: allargare il gate
  fa rientrare le perdite da trend (worstDD > 10%).

  '
universe:
  selection: top_liquidity
  max_assets: 10
  kinds:
  - perp
timeframe: 1h
decision_every_h: 4
signals:
- name: funding_percentile
  params:
    lookback_h: 168
    extreme_pct: 92
- name: taker_flow
  params:
    lookback_h: 24
    threshold: 0.02
- name: vol_compression
  params:
    lookback_h: 48
    pct: 45
entry:
  rule: funding_percentile AND taker_flow AND vol_compression
  direction: contrarian_funding
exit:
  stop_pct: 2.0
  target_r: 1.5
  time_stop_h: 24
evolution:
  mutable:
  - signals
  - entry
  - exit
  - universe.max_assets
  - decision_every_h
  notes: g2-g1 con gate più permissivo (pct 45).
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 3
parent: funding-squeeze-breakout-g2-g1
status: challenger
