name: paper-run

# Run 24/7 in cloud: ogni 4h anche a Mac spento. Paper trading, nessun segreto.
on:
  schedule:
    - cron: "10 */4 * * *"
  workflow_dispatch:

concurrency:
  group: paper-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: dati COT CFTC (settimanali)
        run: uv run scripts/fetch_cot.py || true

      - name: challenger funding-squeeze
        run: uv run scripts/paper_trade.py strategies/generated/funding-squeeze-breakout-g2-g1-g2.yaml BTC,ETH,SOL,XRP,SUI,NEAR,WLD,ZEC,CRV

      - name: challenger tsmom
        run: uv run scripts/paper_trade.py strategies/tsmom-v1.yaml BTC,ETH,xyz_GOLD,xyz_CL,xyz_BRENTOIL,xyz_SILVER,xyz_SP500,xyz_MU

      - name: executor agenti
        run: uv run scripts/agents_paper.py

      # gira solo se il secret CLAUDE_CODE_OAUTH_TOKEN esiste (token piano Pro)
      - name: pipeline LLM (review + decide)
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        run: |
          npm install -g @anthropic-ai/claude-code
          uv run scripts/review.py || true
          uv run scripts/decide.py BTC,ETH,SOL,SUI,ZEC || true
          uv run scripts/agents_paper.py || true

      - name: dashboard
        run: uv run scripts/dashboard.py

      - name: deploy dashboard pubblica (lux-ai.pages.dev)
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: |
          mkdir -p /tmp/lux-deploy && cp dashboard/index.html /tmp/lux-deploy/
          npx -y wrangler@4 pages deploy /tmp/lux-deploy --project-name lux-ai --branch main --commit-dirty=true

      - name: publish
        run: |
          git config user.name "lux-ai-cron"
          git config user.email "actions@users.noreply.github.com"
          git add paper/ dashboard/index.html data/news/
          if ! git diff --cached --quiet; then
            git commit -m "chore: paper run $(date -u '+%Y-%m-%d %H:%M') UTC [actions]"
            git pull --rebase origin main || true
            git push origin main
          fi
