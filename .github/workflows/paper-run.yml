name: paper-run

# Run 24/7 in cloud: ogni ora anche a Mac spento. Paper trading, nessun segreto.
# Trigger orario via Cloudflare Worker (lux-paper-cron) → workflow_dispatch: lo
# scheduler nativo GitHub saltava le run su repo privato. Worker = clock affidabile.
on:
  workflow_dispatch:

concurrency:
  group: paper-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: dati COT CFTC (settimanali)
        run: uv run scripts/fetch_cot.py || true

      # liquidazioni reali per il segnale liq_imbalance (challenger tsmom-liq). Gira solo col secret.
      - name: liquidazioni Coinalyze
        if: env.COINALYZE_API_KEY != ''
        run: uv run scripts/fetch_coinalyze.py --symbols BTC,ETH,SOL,XRP,SUI,NEAR,WLD,ZEC,CRV --months 7 || true

      # trada dinamicamente tutte le strategie attive (champion + challenger)
      - name: paper trading strategie attive
        run: uv run scripts/paper_all.py

      - name: executor agenti
        run: |
          uv run scripts/agents_paper.py
          uv run scripts/agents_paper.py --account agents-rr2-v1 --target-r 2.0 || true   # A/B RR2: stesse decisioni, zero LLM extra

      # gira solo se il secret CLAUDE_CODE_OAUTH_TOKEN esiste (token piano Pro)
      - name: pipeline LLM (review + decide)
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        run: |
          npm install -g @anthropic-ai/claude-code
          uv run scripts/review.py || true
          uv run scripts/decide.py BTC,ETH,SOL,SUI,ZEC || true
          uv run scripts/agents_paper.py || true
          uv run scripts/agents_paper.py --account agents-rr2-v1 --target-r 2.0 || true   # variante RR2

      # EVOLUZIONE SUL CAMPO — promozione/retrocessione AD OGNI RUN (cheap, LLM-free,
      # gate conservativi: no-op finché non ci sono abbastanza trade chiusi).
      - name: promote/retire continuo
        run: uv run scripts/promote.py || true

      # GENERAZIONE nuovi challenger — settimanale (lun 00:xx UTC), serve l'LLM ed è pesante.
      - name: evolve (genera challenger)
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        run: |
          if [ "$(date -u +%u)" = "1" ] && [ "$(date -u +%H)" = "00" ]; then
            command -v claude >/dev/null || npm install -g @anthropic-ai/claude-code
            uv run scripts/evolve_auto.py || true
          else
            echo "evolve: salta (gira lun 00:xx UTC)"
          fi

      - name: dashboard
        run: uv run scripts/dashboard.py

      - name: deploy dashboard pubblica (lux-ai.pages.dev)
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: |
          mkdir -p /tmp/lux-deploy && cp dashboard/index.html /tmp/lux-deploy/
          npx -y wrangler@4 pages deploy /tmp/lux-deploy --project-name lux-ai --branch main --commit-dirty=true

      - name: publish
        run: |
          git config user.name "lux-ai-cron"
          git config user.email "actions@users.noreply.github.com"
          git add paper/ dashboard/index.html data/news/ strategies/
          if ! git diff --cached --quiet; then
            git commit -m "chore: paper run $(date -u '+%Y-%m-%d %H:%M') UTC [actions]"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              sleep 5
            done
          fi
